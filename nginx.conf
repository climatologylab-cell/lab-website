# ================================================================
# nginx.conf - Reverse Proxy for Climatology Lab (Waitress on 8080)
# ================================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip settings for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP Server - Redirect everything to HTTPS
    server {
        listen       80;
        server_name  climatologylab.iitr.ac.in;
        
        location / {
            return 301 https://$host$request_uri;
        }

        # ACME-challenge for Let's Encrypt (Win-ACME will use this)
        location /.well-known/acme-challenge/ {
            root C:/nnginx/html;
        }
    }

    # HTTPS Server - SSL termination
    server {
        listen       443 ssl;
        server_name  climatologylab.iitr.ac.in;

        # SSL Certificates (Paths will be managed by Win-ACME update)
        # Note: These are initial placeholders. Win-ACME will change these.
        ssl_certificate      C:/nssm/ssl/certificate.crt;
        ssl_certificate_key  C:/nssm/ssl/private.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # Proxy requests to Waitress on localhost:8080
        location / {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeout for large uploads/slow queries
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Serve static files directly via Nginx (Faster)
        location /static/ {
            alias C:/ClimatologyLab/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Serve media files directly via Nginx
        location /media/ {
            alias C:/ClimatologyLab/media/;
            expires 30d;
        }
    }
}

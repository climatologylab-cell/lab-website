# ================================================================
# nginx.conf - Reverse Proxy for Climatology Lab (Waitress on 8080)
# Optimized for A+ SSL Labs rating
# ================================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip settings for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP Server - Redirect everything to HTTPS
    server {
        listen       80;
        server_name  climatologylab.iitr.ac.in www.climatologylab.iitr.ac.in;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server - SSL termination
    server {
        listen       443 ssl;
        server_name  climatologylab.iitr.ac.in www.climatologylab.iitr.ac.in;

        # SSL Certificate Bundle (domain + intermediate + cross cert only — NO root)
        ssl_certificate      C:/nssm/ssl/certificate.crt;
        ssl_certificate_key  C:/nssm/ssl/private.key;

        # CA bundle for OCSP stapling verification (intermediate + cross cert)
        ssl_trusted_certificate C:/nssm/ssl/chain.crt;

        # SSL Session
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # Modern TLS only (drops TLS 1.0 and 1.1)
        ssl_protocols        TLSv1.2 TLSv1.3;

        # Strong ciphers only — explicitly exclude ALL weak/CBC/RSA-only suites
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!SRP:!CAMELLIA:!CBC:!RSA;
        ssl_prefer_server_ciphers  off;

        # OCSP Stapling — speeds up SSL handshake
        ssl_stapling         on;
        ssl_stapling_verify  on;
        resolver             8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout     5s;

        # HSTS — tells browsers to always use HTTPS (required for A+)
        # max-age=31536000 = 1 year; includeSubDomains protects all subdomains
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Additional security headers
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # Proxy requests to Waitress on localhost:8080
        location / {
            proxy_pass         http://localhost:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Increase timeout for large uploads/slow queries
            proxy_read_timeout    300s;
            proxy_connect_timeout  75s;
        }

        # Serve static files directly via Nginx (Faster)
        location /static/ {
            alias C:/ClimatologyLab/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Serve media files directly via Nginx
        location /media/ {
            alias C:/ClimatologyLab/media/;
            expires 30d;
        }
    }
}
